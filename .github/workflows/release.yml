name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<package-version>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build wheel and skill release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag || '' }}
        shell: bash
        run: |
          set -euo pipefail

          version="$(
            python - <<'PY'
          from pathlib import Path

          namespace = {}
          exec(Path("src/cofkit/_version.py").read_text(), namespace)
          print(namespace["__version__"])
          PY
          )"

          if [[ -n "$INPUT_TAG" ]]; then
            tag="$INPUT_TAG"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v${version}"
          fi

          normalized_tag="${tag#v}"
          if [[ "$normalized_tag" != "$version" ]]; then
            echo "::error::Release tag '$tag' does not match package version '$version'. Expected 'v${version}'."
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "skill_zip=cofkit-navigator-skill-${version}.zip"
          } >> "$GITHUB_OUTPUT"

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Package skill
        env:
          SKILL_ZIP: ${{ steps.meta.outputs.skill_zip }}
        shell: bash
        run: |
          set -euo pipefail

          cd skills
          zip -r "../dist/${SKILL_ZIP}" "cofkit-navigator" \
            -x "*/__pycache__/*" "*.pyc" ".DS_Store"

      - name: Validate release artifacts
        env:
          SKILL_ZIP: ${{ steps.meta.outputs.skill_zip }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          wheels=(dist/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "::error::Expected exactly one wheel in dist/, found ${#wheels[@]}."
            exit 1
          fi

          if [[ ! -f "dist/${SKILL_ZIP}" ]]; then
            echo "::error::Missing skill archive dist/${SKILL_ZIP}."
            exit 1
          fi

          python - <<'PY'
          import os
          from zipfile import ZipFile

          skill_zip = os.environ["SKILL_ZIP"]
          with ZipFile(f"dist/{skill_zip}") as archive:
              names = set(archive.namelist())

          required = {
              "cofkit-navigator/SKILL.md",
              "cofkit-navigator/agents/openai.yaml",
              "cofkit-navigator/references/intent-routing.md",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"Skill archive is missing required files: {missing}")
          PY

          ls -lh dist/

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: cofkit ${{ steps.meta.outputs.version }}
          SKILL_ZIP: ${{ steps.meta.outputs.skill_zip }}
        shell: bash
        run: |
          set -euo pipefail

          artifacts=(dist/*.whl "dist/${SKILL_ZIP}")

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${artifacts[@]}" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --generate-notes
          fi
